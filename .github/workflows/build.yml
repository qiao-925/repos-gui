name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
            build_cmd: .\dist\CloneX.exe
          - os: macos-latest
            name: macos
            ext: ''
            build_cmd: ./dist/CloneX
          - os: ubuntu-latest
            name: linux
            ext: ''
            build_cmd: ./dist/CloneX

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: |
        uv sync --group build

    - name: Build with PyInstaller
      run: |
        uv run pyinstaller --noconfirm --clean --onefile --windowed --name CloneX --paths src gui.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CloneX-${{ matrix.name }}
        path: dist/CloneX${{ matrix.ext }}

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install

    - name: Install system dependencies for AT-SPI
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb at-spi2-core dbus-x11 \
          gir1.2-atspi-2.0 libgirepository-2.0-dev libcairo2-dev pkg-config

    - name: Install Python dependencies (inspect group)
      run: uv sync --group inspect

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: CloneX-linux
        path: dist

    - name: AT-SPI headless smoke test
      run: |
        chmod +x dist/CloneX
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 &
        sleep 2
        dbus-run-session -- bash -c '
          /usr/libexec/at-spi2-registryd &
          sleep 2
          gsettings set org.gnome.desktop.interface toolkit-accessibility true
          QT_ACCESSIBILITY=1 QT_LINUX_ACCESSIBILITY_ALWAYS_ON=1 ./dist/CloneX &
          APP_PID=$!
          sleep 15
          uv run python scripts/inspect_ui.py --check
          EXIT_CODE=$?
          kill $APP_PID 2>/dev/null || true
          exit $EXIT_CODE
        '

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Rename artifacts with platform suffix
      run: |
        mv artifacts/CloneX-windows/CloneX.exe artifacts/CloneX-windows.exe
        mv artifacts/CloneX-macos/CloneX       artifacts/CloneX-macos
        mv artifacts/CloneX-linux/CloneX        artifacts/CloneX-linux

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/CloneX-windows.exe
          artifacts/CloneX-macos
          artifacts/CloneX-linux
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
