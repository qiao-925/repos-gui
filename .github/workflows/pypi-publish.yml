name: Publish Package

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Package index to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Build distribution
        run: uv build

      - name: Rename package artifacts for release tags
        if: github.event_name == 'push'
        run: |
          mkdir -p release-assets
          cp dist/* release-assets/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true

      - name: Publish to PyPI
        if: (github.event_name == 'workflow_dispatch' && inputs.environment == 'pypi') || github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true
