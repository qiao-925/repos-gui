name: Sync Agent Rules

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Sync agent rules
        run: python scripts/sync-agent-rules.py
      
      - name: Check if files changed
        run: |
          if git diff --quiet; then
            echo "No changes detected"
          else
            echo "Changes detected in generated files"
            git diff
            echo "Note: Generated files are gitignored, this is expected"
          fi
